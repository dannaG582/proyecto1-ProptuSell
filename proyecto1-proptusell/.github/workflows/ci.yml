name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  lint:
    name: Lint HTML/CSS/JS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Run Super-Linter
        uses: github/super-linter@v5
        env:
          VALIDATE_ALL_CODEBASE: true
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
